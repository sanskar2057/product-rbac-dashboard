services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - JWT_SECRET=change-me-in-production

  frontend:
    build:
      context: ./frontend
      args:
        # The browser talks to the backend on the host, so use localhost here.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
